name: Backend — Production Deploy

on:
    push:
        branches:
            - main

env:
    CLOUD_RUN_SERVICE: fastapi-backend
    CLOUD_RUN_REGION: us-central1
    FULL_IMAGE: us-central1-docker.pkg.dev/qwiklabs-gcp-00-717178dcf90e/backend-images/fastapi-app

jobs:
    test:
        name: Unit Tests
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-python@v5
              with:
                python-version: '3.11'
                cache: 'pip'
            - run: pip install -r requirements.txt
            - run: pytest -v --tb=short
              env:
                PYTHONPATH: ${{ github.workspace }}

    build-and-push:
        name: Build & Push Production Image
        runs-on: ubuntu-latest
        needs: test

        steps:
            - uses: actions/checkout@v4

            - name: Authenticate to Google Cloud
              uses: google-github-actions/auth@v2
              with:
                credentials_json: ${{ secrets.GCP_SA_KEY }}

            - name: Configure Docker for Artifact Registry
              run: gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

            - name: Build and Push Docker image
              run: |
                SHORT_SHA=$(echo "${GITHUB_SHA}" | cut -c1-7)
                IMAGE_TAG="prod-${SHORT_SHA}"
                
                docker build \
                    --tag ${{ env.FULL_IMAGE }}:${IMAGE_TAG} \
                    --tag ${{ env.FULL_IMAGE }}:latest \
                    .
                
                docker push ${{ env.FULL_IMAGE }}:${IMAGE_TAG}
                docker push ${{ env.FULL_IMAGE }}:latest
                
                echo "Pushed: ${{ env.FULL_IMAGE }}:${IMAGE_TAG}"

    deploy-production:
        name: Deploy to Production Cloud Run
        runs-on: ubuntu-latest
        needs: build-and-push

        steps:
            - name: Authenticate to Google Cloud
              uses: google-github-actions/auth@v2
              with:
                credentials_json: ${{ secrets.GCP_SA_KEY }}

            - name: Deploy to Cloud Run
              id: deploy
              uses: google-github-actions/deploy-cloudrun@v2
              with:
                service: ${{ env.CLOUD_RUN_SERVICE }}
                region: ${{ env.CLOUD_RUN_REGION }}
                image: ${{ env.FULL_IMAGE }}:latest

            - name: Health check
              id: healthcheck
              run: |
                SERVICE_URL="${{ steps.deploy.outputs.url }}"
                echo "Checking: ${SERVICE_URL}/health"

                for i in {1..5}; do
                    HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${SERVICE_URL}/health")
                    echo "Attempt ${i}: HTTP ${HTTP_STATUS}"
                    if [ "${HTTP_STATUS}" = "200" ]; then
                        echo "Health check passed!"
                        exit 0
                    fi
                    sleep 10
                done

                echo "Health check FAILED"
                exit 1

            - name: Auto-rollback on failure
              if: failure()
              run: |
                PREV_REVISION=$(gcloud run revisions list \
                    --service=${{ env.CLOUD_RUN_SERVICE }} \
                    --region=${{ env.CLOUD_RUN_REGION }} \
                    --format='value(name)' \
                    --sort-by='~createTime' \
                    --limit=2 | tail -1)

                echo "Rolling back to: ${PREV_REVISION}"

                gcloud run services update-traffic ${{ env.CLOUD_RUN_SERVICE }} \
                    --region=${{ env.CLOUD_RUN_REGION }} \
                    --to-revisions="${PREV_REVISION}=100"

            - name: Summary
              if: always()
              run: |
                echo "### Backend Deploy Result" >> $GITHUB_STEP_SUMMARY
                echo "Image: ${{ env.FULL_IMAGE }}:latest" >> $GITHUB_STEP_SUMMARY
                echo "URL: ${{ steps.deploy.outputs.url }}" >> $GITHUB_STEP_SUMMARY