name: Backend — Production Deploy

on:
    push:
        branches:
            - main
    
    workflow_dispatch:
        inputs:
            image_tag:
                description: 'Image tag to deploy (for rollback). Leave empty for latest.'
                required: false
                default: ''

env:
    GAR_LOCATION: us-central1
    GAR_REPOSITORY: backend-images
    IMAGE_NAME: fastapi-app
    PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
    CLOUD_RUN_SERVICE: fastapi-backend
    CLOUD_RUN_REGION: us-central1

jobs:
    test:
        name: Unit Tests
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-python@v5
              with:
                python-version: '3.11'
                cache: 'pip'
            - run: pip install -r requirements.txt
            - run: pytest -v --tb=short
    
    build-and-push:
        name: Build & Push Production Image
        runs-on: ubuntu-latest
        needs: test
        if: github.event.inputs.image_tag == '' || github.event_name == 'push'

        outputs:
            image_tag: ${{ steps.meta.outputs.image_tag }}
            full_image: ${{ steps.meta.outputs.full_image }}
        
        steps:
            - uses: actions/checkout@v4

            - name: Generate image metadata
              id: meta
              run: |
                SHORT_SHA=$(echo "${GITHUB_SHA}" | cut -c1-7)
                IMAGE_TAG="prod-${SHORT_SHA}"
                FULL_IMAGE="${GAR_LOCATION}-docker.pkg.dev/${PROJECT_ID}/${GAR_REPOSITORY}/${IMAGE_NAME}:${IMAGE_TAG}"
                LATEST_IMAGE="${GAR_LOCATION}-docker.pkg.dev/${PROJECT_ID}/${GAR_REPOSITORY}/${IMAGE_NAME}:latest"
                echo "image_tag=${IMAGE_TAG}" >> $GITHUB_OUTPUT
                echo "full_image=${FULL_IMAGE}" >> $GITHUB_OUTPUT
                echo "latest_image=${LATEST_IMAGE}" >> $GITHUB_OUTPUT
            
            - name: Authenticate to Google Cloud
              uses: google-github-actions/auth@v2
              with:
                credentials_json: ${{ secrets.GCP_SA_KEY }}
            
            - name: Configure Docker for Artifact Registry
              run: gcloud auth configure-docker ${{ env.GAR_LOCATION }}-docker.pkg.dev --quiet
            
            - name: Build Docker image
              run: |
                docker build \
                    --tag ${{ steps.meta.outputs.full_image }} \
                    --tag ${{ steps.meta.outputs.latest_image }} \
                    .
            
            - name: Push both tags
              run: |
                docker push ${{ steps.meta.outputs.full_image }}
                docker push ${{ steps.meta.outputs.latest_image }}
            
    
    deploy-production:
        name: Deploy to Production Cloud Run
        runs-on: ubuntu-latest
        needs: build-and-push
        if: always() && (needs.build-and-push.result == 'success' || needs.build-and-push.result == 'skipped')

        steps:
            - name: Authenticate to Google Cloud
              uses: google-github-actions/auth@v2
              with:
                credentials_json: ${{ secrets.GCP_SA_KEY }}
            
            - name: Resolve image to deploy
              id: resolve
              run: |
                if [ -n "${{ github.event.inputs.image_tag }}" ]; then
                    FULL_IMAGE="${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.GAR_REPOSITORY }}/${{ env.IMAGE_NAME }}:${{ github.event.inputs.image_tag }}"
                    echo "DEPLOYING ROLLBACK IMAGE: ${FULL_IMAGE}"
                else
                    FULL_IMAGE="${{ needs.build-and-push.outputs.full_image }}"
                    echo "DEPLOYING NEW IMAGE: ${FULL_IMAGE}"
                fi
                echo "full_image=${FULL_IMAGE}" >> $GITHUB_OUTPUT

            - name: Deploy to Cloud Run
              id: deploy
              uses: google-github-actions/deploy-cloudrun@v2
              with:
                service: ${{ env.CLOUD_RUN_SERVICE }}
                region: ${{ env.CLOUD_RUN_REGION }}
                image: ${{ steps.resolve.outputs.full_image }}
                flags: |
                    --allow-unauthenticated
                    --port=8080
                    --memory=512Mi
                    --cpu=1
                    --min-instances=1
                    --max-instances=10
            
            - name: Health check after deploy
              id: healthcheck
              run: |
                SERVICE_URL="${{ steps.deploy.outputs.url }}"
                echo "Checking health at: ${SERVICE_URL}/health"

                for i in {1..5}; do
                    HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${SERVICE_URL}/health")
                    echo "Attempt ${i}: HTTP ${HTTP_STATUS}"
                    if [ "${HTTP_STATUS}" = "200" ]; then
                        echo "Health check passed!"
                        echo "healthy=true" >> $GITHUB_OUTPUT
                        exit 0
                    fi
                    sleep 10
                done
            
                echo "Health check FAILED after 5 attempts"
                echo "healthy=false" >> $GITHUB_OUTPUT
                exit 1

            - name: Auto-rollback on health check failure
              if: failure() && steps.healthcheck.outputs.healthy == 'false'
              run: |
                echo "Health check failed. Rolling back to previous revision..."

                PREV_REVISION=$(gcloud run revisions list \
                    --service=${{ env.CLOUD_RUN_SERVICE }} \
                    --region=${{ env.CLOUD_RUN_REGION }} \
                    --format='value(name)' \
                    --sort-by='~createTime' \
                    --limit=2 | tail -1)
                
                echo "Rolling back to: ${PREV_REVISION}"

                gcloud run services update-traffic ${{ env.CLOUD_RUN_SERVICE }} \
                    --region=${{ env.CLOUD_RUN_REGION }} \
                    --to-revisions="${PREV_REVISION}=100"
                
                echo "Rollback complete"

            - name: Post deploy summary
              if: always()
              run: |
                echo "### Backend Deploy Result" >> $GITHUB_STEP_SUMMARY
                echo "Image: ${{ steps.resolve.outputs.full_image }}" >> $GITHUB_STEP_SUMMARY
                echo "URL: ${{ steps.deploy.outputs.url }}" >> $GITHUB_STEP_SUMMARY
                echo "Health: ${{ steps.healthcheck.outputs.healthy }}" >> $GITHUB_STEP_SUMMARY
                


            
                    